# https://docs.helix-editor.com/editor.html

# darktheme
theme = "ayu_mirage"

# whitetheme
# theme = "zed_onelight"

[editor]
# line-number = "relative"
true-color = true
# rulers = [80]
color-modes = true
popup-border = "all"

[editor.statusline]
left = ["mode", "spinner", "version-control"]
center = ["file-name"]
right = ["diagnostics", "selections", "position", "file-encoding", "file-line-ending", "file-type"]
separator = "|"
mode.normal = "NORMAL$"
mode.insert = "INSERT>"
mode.select = "SELECT_"

[editor.lsp]
display-messages = true
display-inlay-hints = true
snippets = true


[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.soft-wrap]
enable = true

# [keys.normal]
# "space" = { w = ":write", q = ":quit" }

[keys.insert]
j = {j = "normal_mode"}
